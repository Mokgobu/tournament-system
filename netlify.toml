[build]
  functions = "netlify/functions"
  publish = "src"

[dev]
  functions = "netlify/functions"
  publish = "src"
  autoLaunch = true

# Redirect all /api/* requests to functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Handle SPA routing - this must be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200